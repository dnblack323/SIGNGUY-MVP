name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports: ["27017:27017"]
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MONGO_URL: mongodb://localhost:27017
      DB_NAME: signguy_ci
      ENV: test
      AUTH_DEV_BYPASS: "true"
      CORS_ORIGINS: "*"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Run backend test suite
        working-directory: backend
        run: python -m pytest tests/ -q

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: frontend/yarn.lock
      - name: Install frontend dependencies (frozen lockfile)
        run: yarn install --frozen-lockfile
      - name: Run frontend test suite
        run: CI=true yarn test --watchAll=false

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: frontend/yarn.lock
      - name: Install frontend dependencies (frozen lockfile, clean environment)
        run: yarn install --frozen-lockfile
      - name: Production build
        env:
          CI: "true"
          GENERATE_SOURCEMAP: "false"
          REACT_APP_BACKEND_URL: "https://placeholder.invalid"
        run: yarn build
